  <path d="M17 3c0 5-10 5-10 9s10 4 10 9"/>
  <path d="M8.4 7h7.2M8.4 17h7.2M7.4 12h9.2"/>
</symbol>

<!-- Экология: лист -->
<symbol id="nk-eco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
