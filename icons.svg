  <ellipse cx="12" cy="11.5" rx="11" ry="3.6" transform="rotate(-22 12 11.5)"/>
</symbol>

<!-- Инженерия: шестерня -->
<symbol id="nk-robo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
