<!-- Шаг 1: планета/выбор мира -->
<symbol id="nk-world" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="8.2"/>
  <path d="M4.4 9.2c2.6 1.6 5.3 1.2 6.4 3.1 1 1.8-.6 3-.2 4.6.2 1 1 1.7 1.6 2.2"/>
  <path d="M19.4 9.6c-1.6.6-3.4.2-4.2-.9-.7-1-.2-2.3.7-2.9"/>
</symbol>

<!-- Шаг 2: геймпад -->
<symbol id="nk-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M7.5 7.5h9a4.5 4.5 0 0 1 4.4 3.6l.7 4.1a2.6 2.6 0 0 1-4.7 1.9L15.7 15H8.3l-1.2 2.1a2.6 2.6 0 0 1-4.7-1.9l.7-4.1A4.5 4.5 0 0 1 7.5 7.5z"/>
  <path d="M6.6 11.2v2M5.6 12.2h2M16.4 11.4h.01M18 13.2h.01"/>
</symbol>

<!-- Ракета (финальный CTA) -->
<symbol id="nk-rocket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2.5c3 2.4 4.6 5.9 4.6 9.6L12 17.2 7.4 12.1c0-3.7 1.6-7.2 4.6-9.6z"/>
  <circle cx="12" cy="10" r="1.9"/>
  <path d="M7.4 12.1 4.6 14.4l1.2 3.2 2.6-1.4M16.6 12.1l2.8 2.3-1.2 3.2-2.6-1.4"/>
  <path d="M10.6 18.6c.5 1.4 1.4 2.4 1.4 2.4s.9-1 1.4-2.4"/>
</symbol>

<!-- Галочка (безопасность в герое) -->
<symbol id="nk-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4.5 12.5 9.5 17.5 19.5 6.5"/>
