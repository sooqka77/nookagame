</symbol>

<!-- Безопасность: щит -->
<symbol id="nk-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2.8 4.5 6v6c0 4.6 3.2 8 7.5 9.2 4.3-1.2 7.5-4.6 7.5-9.2V6z"/>
  <path d="M8.8 12.2l2.3 2.3 4.1-4.6"/>
