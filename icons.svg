  <circle cx="11" cy="17.4" r="1"/><circle cx="14.4" cy="18.4" r=".7"/>
</symbol>

<!-- Код: блоки программы -->
<symbol id="nk-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="4" width="11" height="5.2" rx="1.8"/>
  <rect x="7" y="14.8" width="11" height="5.2" rx="1.8"/>
  <path d="M17.5 6.6 20.5 6.6M6.5 17.4 3.5 17.4"/>
  <path d="M14 9.2v2.4a2 2 0 0 0 2 2h1"/>
</symbol>

<!-- Астрономия: планета -->
<symbol id="nk-space" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
