  <ellipse cx="12" cy="12" rx="9.5" ry="4" transform="rotate(60 12 12)"/>
  <ellipse cx="12" cy="12" rx="9.5" ry="4" transform="rotate(120 12 12)"/>
</symbol>

<!-- Химия: колба с пузырьками -->
<symbol id="nk-chem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9.5 3v5.2L4.6 17a2.6 2.6 0 0 0 2.25 3.9h10.3A2.6 2.6 0 0 0 19.4 17l-4.9-8.8V3"/>
