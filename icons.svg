<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<!-- Nooka icon set. Сетка 24×24, обводка 2, скругления круглые.
     Красится через currentColor. Использование: <svg class="ic"><use href="icons.svg#nk-ai"></use></svg> -->

<!-- ИИ: нейросеть (узлы + связи) -->
<symbol id="nk-ai" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="5" cy="6" r="2.1"/><circle cx="5" cy="18" r="2.1"/>
  <circle cx="12" cy="12" r="2.4"/>
  <circle cx="19" cy="7.5" r="2.1"/><circle cx="19" cy="16.5" r="2.1"/>
  <path d="M6.9 7.1 9.9 10.6M6.9 16.9 9.9 13.4M14.3 10.9 17.1 8.7M14.3 13.1 17.1 15.3"/>
</symbol>

<!-- Промпт: реплика с искрой -->
<symbol id="nk-prompt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 13.5c0 3-2.7 5.2-6.3 5.2-.9 0-1.7-.1-2.5-.4L6.5 20l1.1-3.2C5.4 15.8 4 13.8 4 11.5 4 8 7.6 5.5 12 5.5s8 2.5 8 6z"/>
  <path d="M12 8.6l.85 2.05L15 11.5l-2.15.85L12 14.4l-.85-2.05L9 11.5l2.15-.85z"/>
</symbol>

<!-- Физика: атом -->
<symbol id="nk-phys" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
