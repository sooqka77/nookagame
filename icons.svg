<symbol id="nk-math" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M3.5 20.5h17L3.5 3.5z"/>
  <path d="M3.5 14.2h4M3.5 9.6h2.6M8.6 20.5v-3.2M13.4 20.5v-2.4"/>
</symbol>

<!-- География: глобус -->
<symbol id="nk-geo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="9"/>
  <path d="M3.2 9.6h17.6M3.2 14.4h17.6"/>
  <ellipse cx="12" cy="12" rx="4" ry="9"/>
</symbol>

<!-- Методика: диплом/шапочка -->
<symbol id="nk-method" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M2.5 8.5 12 4l9.5 4.5L12 13z"/>
  <path d="M6.5 10.6v4.6c0 1.9 2.5 3.3 5.5 3.3s5.5-1.4 5.5-3.3v-4.6"/>
