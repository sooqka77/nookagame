</g>
<!-- луна -->
<circle cx="150" cy="120" r="34" fill="#E5E7EB"/><circle cx="140" cy="112" r="8" fill="#9CA3AF" opacity=".7"/><circle cx="162" cy="132" r="6" fill="#9CA3AF" opacity=".6"/>
<rect x="40" y="386" width="440" height="60" rx="18" fill="#111118" opacity=".92"/>
<text x="64" y="412" font-size="19" font-weight="800" fill="#fff">КосмоПорт</text>
