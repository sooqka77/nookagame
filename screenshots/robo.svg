<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFF7ED"/><stop offset="1" stop-color="#FFEDD5"/></linearGradient>
</defs>
<rect width="800" height="480" fill="url(#bg)"/>
<!-- большая шестерёнка -->
