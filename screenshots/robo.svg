<text x="120" y="90" font-size="40">🔧</text><text x="640" y="120" font-size="34">⚙️</text>
<rect x="40" y="386" width="430" height="60" rx="18" fill="#111118" opacity=".92"/>
<text x="64" y="412" font-size="19" font-weight="800" fill="#fff">РобоЛаб</text>
<text x="64" y="434" font-size="13" fill="#FDBA74">Шестерёнки, рычаги, моторы — собери машину сам</text>
