<!-- рычаг и мячик -->
<circle cx="560" cy="330" r="22" fill="#111118"/>
<rect x="450" y="308" width="260" height="16" rx="8" fill="#3B82F6" transform="rotate(-9 580 316)"/>
<circle cx="700" cy="272" r="26" fill="#FF5038"/>
<path d="M700 236 q 6 -26 30 -34" stroke="#FF5038" stroke-width="4" fill="none" stroke-dasharray="2 10" stroke-linecap="round"/>
