<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Space Grotesk','Arial Rounded MT Bold',sans-serif">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fca5a5"/></linearGradient>
</defs>
<rect width="800" height="480" fill="url(#bg)"/>
<!-- сетка -->
<g stroke="#fff" stroke-width="1.5" opacity=".5">
<line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="360" x2="800" y2="360"/>
<line x1="160" y1="0" x2="160" y2="480"/><line x1="320" y1="0" x2="320" y2="480"/><line x1="480" y1="0" x2="480" y2="480"/><line x1="640" y1="0" x2="640" y2="480"/>
</g>
<!-- фигуры -->
<rect x="110" y="90" width="120" height="120" rx="20" fill="#FF5038" transform="rotate(-8 170 150)"/>
<circle cx="420" cy="160" r="70" fill="#7B2FFF"/>
<path d="M610 90 l70 122 h-140 z" fill="#FFE141"/>
<text x="170" y="165" text-anchor="middle" font-size="44" font-weight="800" fill="#fff" transform="rotate(-8 170 150)">7</text>
<text x="420" y="176" text-anchor="middle" font-size="44" font-weight="800" fill="#fff">×</text>
<text x="645" y="185" text-anchor="middle" font-size="40" font-weight="800" fill="#111118">?</text>
<!-- пример-пазл -->
<rect x="200" y="280" width="400" height="76" rx="20" fill="#fff" opacity=".95"/>
<text x="400" y="330" text-anchor="middle" font-size="36" font-weight="800" fill="#111118">7 × 8 = 5<tspan fill="#FF5038">?</tspan></text>
<rect x="40" y="386" width="400" height="60" rx="18" fill="#991B1B" opacity=".92"/>
<text x="64" y="412" font-size="19" font-weight="800" fill="#fff">МатрицаX</text>
<text x="64" y="434" font-size="13" fill="#fecaca">Логические задачи, где ответ надо построить, а не угадать</text>
<rect x="614" y="30" width="156" height="34" rx="17" fill="#111118"/>
<text x="692" y="52" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">в разработке</text>
</svg>
