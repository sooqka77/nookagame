<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Space Grotesk','Arial Rounded MT Bold',sans-serif">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#312e81"/><stop offset="1" stop-color="#1e1b4b"/></linearGradient>
<linearGradient id="bot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#A855F7"/><stop offset="1" stop-color="#7B2FFF"/></linearGradient>
</defs>
<rect width="800" height="480" fill="url(#bg)"/>
<g opacity=".25" stroke="#7B2FFF" stroke-width="2">
<path d="M0 120 H800 M0 240 H800 M0 360 H800 M160 0 V480 M320 0 V480 M480 0 V480 M640 0 V480"/>
</g>
<!-- клетки-путь -->
<g>
<rect x="180" y="250" width="100" height="100" rx="16" fill="#FFE141" opacity=".9"/>
<rect x="290" y="250" width="100" height="100" rx="16" fill="#FFE141" opacity=".55"/>
<rect x="400" y="250" width="100" height="100" rx="16" fill="#FFE141" opacity=".3"/>
<rect x="400" y="140" width="100" height="100" rx="16" fill="#FFE141" opacity=".18"/>
<text x="450" y="205" text-anchor="middle" font-size="34">⭐</text>
</g>
<!-- робот -->
<g>
<rect x="196" y="176" width="68" height="58" rx="16" fill="url(#bot)"/>
<rect x="206" y="150" width="48" height="34" rx="12" fill="url(#bot)"/>
<circle cx="221" cy="166" r="7" fill="#fff"/><circle cx="241" cy="166" r="7" fill="#fff"/>
<circle cx="223" cy="167" r="3.5" fill="#111118"/><circle cx="243" cy="167" r="3.5" fill="#111118"/>
<line x1="230" y1="150" x2="230" y2="136" stroke="#FFE141" stroke-width="4" stroke-linecap="round"/>
<circle cx="230" cy="132" r="6" fill="#FFE141"/>
<rect x="206" y="236" width="18" height="14" rx="6" fill="#4C1D95"/><rect x="236" y="236" width="18" height="14" rx="6" fill="#4C1D95"/>
</g>
<!-- блоки команд -->
<g font-size="16" font-weight="800" fill="#fff">
<rect x="560" y="90" width="190" height="46" rx="14" fill="#7B2FFF"/><text x="580" y="119">→ вперёд ×2</text>
<rect x="576" y="146" width="190" height="46" rx="14" fill="#FF5038"/><text x="596" y="175">⟳ поворот</text>
<rect x="560" y="202" width="190" height="46" rx="14" fill="#00C27C"/><text x="580" y="231">↻ повтори 3</text>
<rect x="576" y="258" width="190" height="46" rx="14" fill="#3B82F6"/><text x="596" y="287">★ возьми</text>
</g>
<rect x="40" y="386" width="420" height="60" rx="18" fill="#111118" opacity=".92"/>
<text x="64" y="412" font-size="19" font-weight="800" fill="#fff">КодБот</text>
<text x="64" y="434" font-size="13" fill="#C4B5FD">Составь программу — и робот дойдёт до звезды</text>
<rect x="614" y="30" width="156" height="34" rx="17" fill="#FFE141"/>
<text x="692" y="52" text-anchor="middle" font-size="14" font-weight="800" fill="#111118">в разработке</text>
</svg>
